<!DOCTYPE html>
<html>
<head>
    <link rel="stylesheet" href="/css/style.css">
    <h1>Restaurant CGI</h1>
</head>
<body>
<!--Main div to hold application-->
<div class="container">
    <!--div to hold the restaurant layout-->
    <div class="restaurant-layout-container">
        <!--Grid layout of restaurant tables-->
        <div class="grid-container" id="grid-container">
        </div>

    </div>
    <!--div to hold the options-->
    <div class="option-menu">
        <h1>Reservation options</h1>
        <div class="option">
            <!--todo implement-->
            <p># of people</p>
            <input class="selection" id="client-count"></input>
        </div>
        <div class="option">
            <p>Seating location</p>
            <select class="selection" id="seating-location">
                <option value="outside">Inside</option>
                <option value="inside">Outside</option>
                <option value="private">Private</option>
            </select>
        </div>

        <div class="option">
            <p>Seating preferences</p>
            <select class="selection" id="client-preferences">
                <option value="default">None</option>
                <option value="window">Window</option>
                <option value="sofa">Sofa</option>
                <option value="chairs">Chairs</option>
                <option value="roundtable">Round table</option>

            </select>
        </div>

        <div class="option">
            <p>Datetime selection</p>
            <div class="datetime-option">
            <!--2 divs, one for date and one for time-->
                <div class="datetime-selection">
                    <select class="selection" id="date-selection">
                    </select>
                </div>
                <div class="datetime-selection">
                    <select class="selection" id="time-selection">
                    </select>
                </div>

            </div>
        </div>
        <div class="option">
            <button class="reserve-button" onclick="reserveTable()">
                <span>Reserve table</span>
            </button>
        </div>
    </div>
</div>>
</body>
</html>
<script src="/js/script.js"></script>
